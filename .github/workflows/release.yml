name: Release Extensions

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest versions
        run: |
          for browser in chrome firefox edge; do
            jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
              "$browser/manifest.json" > tmp.json && mv tmp.json "$browser/manifest.json"
          done

      - name: Build
        run: ./build.sh

      - name: Package extensions
        run: |
          for browser in chrome firefox edge; do
            cd "$browser"
            zip -r "../jira-links-${browser}-${{ steps.version.outputs.version }}.zip" . -x '*.git*'
            cd ..
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Jira Links ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            jira-links-chrome-${{ steps.version.outputs.version }}.zip
            jira-links-firefox-${{ steps.version.outputs.version }}.zip
            jira-links-edge-${{ steps.version.outputs.version }}.zip
